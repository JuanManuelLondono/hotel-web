@if (whatsappUrl(); as url) {
  <div class="whatsapp-wrapper">
    @if (bubbleVisible()) {
      <div class="whatsapp-bubble">
        <button class="bubble-close" (click)="dismissBubble($event)" aria-label="Cerrar mensaje">
          <span class="material-symbols-outlined">close</span>
        </button>
        <p>{{ message() }}</p>
        <span class="bubble-arrow"></span>
      </div>
    }

    <a [href]="url" target="_blank" rel="noopener noreferrer" class="whatsapp-fab" aria-label="Contactar por WhatsApp">
      <svg viewBox="0 0 24 24" class="whatsapp-icon" aria-hidden="true">
        <path fill="currentColor" d="M17.6 6.32A7.85 7.85 0 0 0 12.05 4a7.94 7.94 0 0 0-6.9 11.9L4 20l4.2-1.1a7.9 7.9 0 0 0 3.85 1a7.94 7.94 0 0 0 5.55-13.58ZM12.05 18.53a6.6 6.6 0 0 1-3.37-.92l-.24-.14l-2.5.66l.67-2.44l-.16-.25a6.59 6.59 0 0 1 10.35-8.13a6.55 6.55 0 0 1 1.94 4.67a6.6 6.6 0 0 1-6.69 6.55Zm3.6-4.93c-.2-.1-1.17-.58-1.35-.64s-.32-.1-.45.1s-.5.64-.62.77s-.24.15-.44.05a5.4 5.4 0 0 1-1.6-.98a6 6 0 0 1-1.1-1.37c-.12-.2 0-.3.09-.4s.2-.24.3-.36a1.3 1.3 0 0 0 .2-.34a.4.4 0 0 0 0-.36c-.05-.1-.45-1.07-.61-1.47c-.16-.38-.33-.33-.45-.34h-.39a.74.74 0 0 0-.54.25a2.24 2.24 0 0 0-.7 1.67a3.9 3.9 0 0 0 .82 2.07a8.9 8.9 0 0 0 3.4 3c.48.2.85.33 1.14.42a2.74 2.74 0 0 0 1.26.08a2.07 2.07 0 0 0 1.35-.95a1.7 1.7 0 0 0 .12-.95c-.05-.1-.18-.15-.38-.25Z"/>
      </svg>
    </a>
  </div>
}
